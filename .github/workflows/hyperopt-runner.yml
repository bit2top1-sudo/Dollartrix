name: Hyperopt Runner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-hyperopt]

jobs:
  run-hyperopt:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: Clone private repo (Miadol)
        run: |
          git clone https://x-access-token:${{ secrets.FREQTRADE_CORE_PAT }}@github.com/${{ github.repository_owner }}/Miadol.git private

      - name: Cache pip dependencies
        # Caches the entire pip site-packages dir between runs of this workflow.
        # Key includes the Python version so a Python upgrade doesn't serve a
        # stale cache. On a cache hit the restore step runs in ~5-10s instead
        # of 60-90s for a fresh install. On a cache miss (first ever run, or
        # after a Python version bump) it falls through to the install step
        # below exactly as it always did — no crash, no special handling needed.
        # The cache is saved at the end of the job only if the install step ran.
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: freqtrade-hyperopt-${{ runner.os }}-py${{ env.pythonLocation }}-v1
          restore-keys: |
            freqtrade-hyperopt-${{ runner.os }}-

      - name: Install Freqtrade + deps
        # Always runs — pip is idempotent and skips packages that are already
        # present in the restored cache, so a cache hit makes this near-instant.
        # A cache miss (first run, or cache evicted) installs from scratch as
        # before. Either way: no crash, correct result.
        run: |
          pip install "freqtrade[hyperopt]" scipy numba bottleneck scikit-learn statsmodels

      - name: Run hyperopt and export best params
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set -e
          cd private
          git config user.email "hyperopt@local"
          git config user.name "Hyperopt Runner"

          python3 - << 'PYEOF'
          import json, os, subprocess, sys, shutil, time, glob, urllib.request

          payload = json.loads(os.environ["PAYLOAD"])
          bot_name = payload["bot_name"]
          strategy_class = payload["strategy_class"]
          base_config = payload["base_config"]
          loss_function = payload["loss_function"]
          lookback_days = int(payload["lookback_days"])
          epochs = int(payload["epochs"])
          early_stop = int(payload.get("early_stop", 0))
          random_state = payload.get("random_state")
          warm_start_mode = payload.get("warm_start_mode", "warm")  # warm | cold | upload
          upload_path = payload.get("upload_path")  # set only if warm_start_mode == "upload"
          reload_after = payload.get("reload_after", False)
          # spaces: explicit list of tokens e.g. ["buy", "sell", "roi"].
          # Always required — meta_bot enforces this; no silent "all" fallback.
          spaces = payload.get("spaces", ["all"])
          if isinstance(spaces, str):
              spaces = spaces.split()

          USER_DATA = "freqtrade-core/user_data"
          STRATEGY_DIR = f"{USER_DATA}/strategies"
          PARAMS_PATH = f"{STRATEGY_DIR}/{strategy_class}.json"
          CONFIG_PATH = f"{USER_DATA}/configs/{base_config}"
          BOT_DIR = f"{USER_DATA}/live_bots/{bot_name}"
          SECRETS_PATH = f"{BOT_DIR}/secrets.json"
          HYPEROPT_RESULTS_DIR = f"{USER_DATA}/hyperopt_results"

          def _tg_creds():
              try:
                  with open(SECRETS_PATH) as f:
                      secrets = json.load(f)
                  tg = secrets.get("telegram", {})
                  return tg.get("token"), tg.get("chat_id")
              except Exception:
                  return None, None

          def send_telegram(text):
              try:
                  token, chat_id = _tg_creds()
                  if not token or not chat_id:
                      return
                  body = json.dumps({"chat_id": chat_id, "text": text, "parse_mode": "HTML"}).encode()
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      data=body, headers={"Content-Type": "application/json"})
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f"Telegram notify failed (non-fatal): {e}")

          def send_telegram_file(file_path, caption=""):
              """Send a file to Telegram via sendDocument. Non-fatal on any error."""
              try:
                  token, chat_id = _tg_creds()
                  if not token or not chat_id:
                      return
                  if not os.path.exists(file_path):
                      print(f"send_telegram_file: {file_path} not found, skipping")
                      return
                  import mimetypes
                  boundary = "----HyperoptBoundary"
                  fname = os.path.basename(file_path)
                  with open(file_path, "rb") as fh:
                      file_bytes = fh.read()
                  mime = mimetypes.guess_type(fname)[0] or "application/octet-stream"
                  def part(name, value, filename=None, content_type=None):
                      cd = f'Content-Disposition: form-data; name="{name}"'
                      if filename:
                          cd += f'; filename="{filename}"'
                      ct = f"\r\nContent-Type: {content_type}" if content_type else ""
                      return f"--{boundary}\r\n{cd}{ct}\r\n\r\n".encode() + (
                          value if isinstance(value, bytes) else value.encode()) + b"\r\n"
                  body = (
                      part("chat_id", str(chat_id)) +
                      part("caption", caption[:1024]) +
                      part("document", file_bytes, filename=fname, content_type=mime) +
                      f"--{boundary}--\r\n".encode()
                  )
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendDocument",
                      data=body,
                      headers={"Content-Type": f"multipart/form-data; boundary={boundary}"})
                  urllib.request.urlopen(req, timeout=30)
                  print(f"Sent file to Telegram: {fname}")
              except Exception as e:
                  print(f"Telegram file send failed (non-fatal): {e}")

          # --- Warm/cold start handling ---
          # COLD: move the existing params file out of the way so hyperopt
          # evaluates from the strategy's class defaults, not last run's params.
          # WARM: leave the existing file exactly where it is.
          # UPLOAD: a JSON the person uploaded via the meta-bot — normalize it
          # into the shape Freqtrade actually expects before placing it here,
          # since a raw hyperopt epoch blob and an already-formatted strategy
          # param file are NOT the same shape.
          if warm_start_mode == "cold" and os.path.exists(PARAMS_PATH):
              shutil.move(PARAMS_PATH, f"{PARAMS_PATH}.coldstart-backup-{int(time.time())}")
              print(f"Cold start: backed up existing {PARAMS_PATH}")
          elif warm_start_mode == "upload" and upload_path:
              with open(upload_path) as f:
                  raw = json.load(f)
              if "params" in raw and "strategy_name" in raw:
                  formatted = raw  # already in the correct shape
              else:
                  # Raw hyperopt epoch blob — wrap it into the expected shape.
                  params = raw.get("params_dict", raw)
                  formatted = {
                      "strategy_name": strategy_class,
                      "params": params,
                      "ft_stratparam_v": 1,
                      "export_time": time.time(),
                  }
              with open(PARAMS_PATH, "w") as f:
                  json.dump(formatted, f, indent=2)
              print(f"Warm start from upload: normalized and placed at {PARAMS_PATH}")
          else:
              print("Warm start: using whatever params file is already there, if any.")

          # --- Build the timerange the same way auto18.py does: shell out to
          # the actual `date -d` command rather than computing it in Python.
          def date_d(spec):
              return subprocess.run(["date", "-d", spec, "+%Y%m%d"],
                                     capture_output=True, text=True, check=True).stdout.strip()

          end = date_d("today")
          eval_start = date_d(f"{lookback_days} days ago")
          timerange = f"{eval_start}-{end}"

          # Indicators need warmup candles BEFORE the evaluation window starts
          # — without this, the first chunk of the requested range gets
          # evaluated on incomplete indicators. 10 days is comfortably more
          # than enough for any startup_candle_count in the thousands on a
          # 1m timeframe; download-data covers this wider range, hyperopt's
          # own --timerange stays exactly what was asked for.
          download_start = date_d(f"{lookback_days + 10} days ago")
          download_timerange = f"{download_start}-{end}"

          dl_cmd = [
              "freqtrade", "download-data",
              "--user-data-dir", USER_DATA,
              "--config", CONFIG_PATH,
              "--timerange", download_timerange,
          ]
          print("Downloading data:", " ".join(dl_cmd))
          send_telegram(f"📥 Downloading data for <b>{bot_name}</b> before hyperopt "
                        f"({download_timerange})...")
          dl_result = subprocess.run(dl_cmd, capture_output=True, text=True)
          print(dl_result.stdout[-3000:])
          print(dl_result.stderr[-2000:])
          if dl_result.returncode != 0:
              send_telegram(f"❌ Data download FAILED for <b>{bot_name}</b> — check the Actions log.")
              sys.exit(1)

          # Snapshot existing .fthypt files so we can identify the new one after.
          fthypt_before = set(glob.glob(os.path.join(HYPEROPT_RESULTS_DIR, "*.fthypt")))

          cmd = [
              "freqtrade", "hyperopt",
              "--user-data-dir", USER_DATA,
              "--config", CONFIG_PATH,
              "--strategy", strategy_class,
              "--strategy-path", STRATEGY_DIR,
              "--hyperopt-loss", loss_function,
              "--epochs", str(epochs),
              "--timerange", timerange,
              "-j", "-1",
          ]
          # --spaces takes multiple tokens; each must be a separate list element.
          for s in spaces:
              cmd += ["--spaces", s]
          if early_stop:
              cmd += ["--early-stop", str(early_stop)]
          if random_state is not None:
              cmd += ["--random-state", str(random_state)]

          spaces_str = " ".join(spaces)
          print("Running:", " ".join(cmd))
          send_telegram(f"🧬 Hyperopt starting for <b>{bot_name}</b> ({strategy_class}, "
                        f"{epochs} epochs, {loss_function}, spaces: {spaces_str}, {warm_start_mode} start)")

          result = subprocess.run(cmd, capture_output=True, text=True)
          stdout_tail = result.stdout[-5000:]
          print(stdout_tail)
          print(result.stderr[-3000:])

          if result.returncode != 0:
              send_telegram(f"❌ Hyperopt FAILED for <b>{bot_name}</b> — check the Actions log.")
              sys.exit(1)

          # --- Parse results table and best epoch from stdout ---
          # Mirrors the parsing logic in auto18.py: capture lines between the
          # epoch table header and the "Best result:" summary line.
          table_lines = []
          capture = False
          best_result_line = ""
          for line in result.stdout.splitlines():
              if "Epoch" in line and "Trades" in line and "Win" in line:
                  capture = True
              if capture and "Best result:" in line:
                  best_result_line = line.strip()
                  capture = False
              if capture:
                  table_lines.append(line)
          table_text = "\n".join(table_lines).strip()
          # Strip non-ASCII box-drawing chars for Telegram compatibility
          import re
          table_clean = re.sub(r'[^\x20-\x7E\n]', ' ', table_text)

          # --- Build and send the results summary message ---
          summary_parts = [f"✅ <b>Hyperopt done</b> — <b>{bot_name}</b> / {strategy_class}",
                           f"Spaces: {spaces_str} | Loss: {loss_function} | Epochs: {epochs}"]
          if best_result_line:
              summary_parts.append(f"\n{best_result_line}")
          if table_clean:
              # Telegram message limit 4096; leave room for header
              table_excerpt = table_clean[-2800:] if len(table_clean) > 2800 else table_clean
              summary_parts.append(f"\n<pre>{table_excerpt}</pre>")
          summary_parts.append(
              "\n" + ("⚡ Reloading config now." if reload_after
                      else "ℹ️ Will apply on next scheduled reload or Restart Now."))
          send_telegram("\n".join(summary_parts))

          # --- Send the params .json file ---
          # Freqtrade exports best epoch params here automatically.
          send_telegram_file(PARAMS_PATH,
                             caption=f"📄 Best params — {strategy_class} ({bot_name})")

          # --- Send the .fthypt results file ---
          # Find whichever .fthypt appeared after we started (newest by mtime).
          fthypt_after = set(glob.glob(os.path.join(HYPEROPT_RESULTS_DIR, "*.fthypt")))
          new_fthypts = fthypt_after - fthypt_before
          if new_fthypts:
              newest = max(new_fthypts, key=os.path.getmtime)
              send_telegram_file(newest,
                                 caption=f"📊 Hyperopt results file — {bot_name} ({strategy_class})")
          else:
              print("No new .fthypt file found — skipping file send.")

          # --- reload_after: lightweight watchdog flag, not a full restart ---
          if reload_after:
              # Mirrors request_reload_config() in meta_bot.py exactly.
              watchdog_config_path = f"{BOT_DIR}/watchdog_config.json"
              try:
                  with open(watchdog_config_path) as f:
                      wd_cfg = json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  wd_cfg = {}
              wd_cfg["reload_config_requested"] = True
              with open(watchdog_config_path, "w") as f:
                  json.dump(wd_cfg, f)
              print(f"Set reload_config_requested=True in {watchdog_config_path} — watchdog will pick this up within ~2s.")
          PYEOF

          # Commit whatever changed — new params file, watchdog_config.json if
          # reload_after, cold-start backup file. Same pull-rebase-retry pattern
          # as everything else in this system.
          git add -A
          git commit -q -m "hyperopt: updated params via Hyperopt Runner" || true
          PUSH_OK=false
          for attempt in 1 2 3 4 5; do
            if git push -q; then
              PUSH_OK=true
              break
            fi
            echo "Push attempt ${attempt} failed — pulling and retrying..."
            git pull --rebase -q || true
            git add -A  # re-stage anything the pull brought in or rebased over
            sleep $((attempt * 2))
          done
          if [ "$PUSH_OK" = false ]; then
            echo "::error::Hyperopt params commit FAILED after 5 attempts — params may not have persisted!"
          fi
