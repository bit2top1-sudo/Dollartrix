name: Hyperopt Runner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-hyperopt]

jobs:
  run-hyperopt:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: Clone private repo (Miadol)
        run: |
          git clone https://x-access-token:${{ secrets.FREQTRADE_CORE_PAT }}@github.com/${{ github.repository_owner }}/Miadol.git private

      - name: Install Freqtrade + deps
        run: |
          pip install "freqtrade[hyperopt]" scipy numba bottleneck scikit-learn statsmodels

      - name: Run hyperopt and export best params
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set -e
          cd private
          git config user.email "hyperopt@local"
          git config user.name "Hyperopt Runner"

          python3 - << 'PYEOF'
          import json, os, subprocess, sys, shutil, time

          payload = json.loads(os.environ["PAYLOAD"])
          bot_name = payload["bot_name"]
          strategy_class = payload["strategy_class"]
          base_config = payload["base_config"]
          loss_function = payload["loss_function"]
          lookback_days = int(payload["lookback_days"])
          epochs = int(payload["epochs"])
          early_stop = int(payload.get("early_stop", 0))
          random_state = payload.get("random_state")
          warm_start_mode = payload.get("warm_start_mode", "warm")  # warm | cold | upload
          upload_path = payload.get("upload_path")  # set only if warm_start_mode == "upload"
          reload_after = payload.get("reload_after", False)

          USER_DATA = "freqtrade-core/user_data"
          STRATEGY_DIR = f"{USER_DATA}/strategies"
          PARAMS_PATH = f"{STRATEGY_DIR}/{strategy_class}.json"
          CONFIG_PATH = f"{USER_DATA}/configs/{base_config}"
          BOT_DIR = f"{USER_DATA}/live_bots/{bot_name}"
          SECRETS_PATH = f"{BOT_DIR}/secrets.json"

          def send_telegram(text):
              try:
                  with open(SECRETS_PATH) as f:
                      secrets = json.load(f)
                  tg = secrets.get("telegram", {})
                  token, chat_id = tg.get("token"), tg.get("chat_id")
                  if not token or not chat_id:
                      return
                  import urllib.request
                  body = json.dumps({"chat_id": chat_id, "text": text, "parse_mode": "HTML"}).encode()
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      data=body, headers={"Content-Type": "application/json"})
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f"Telegram notify failed (non-fatal): {e}")

          # --- Warm/cold start handling ---
          # COLD: move the existing params file out of the way so hyperopt
          # evaluates from the strategy's class defaults, not last run's params.
          # WARM: leave the existing file exactly where it is.
          # UPLOAD: a JSON the person uploaded via the meta-bot — normalize it
          # into the shape Freqtrade actually expects before placing it here,
          # since a raw hyperopt epoch blob and an already-formatted strategy
          # param file are NOT the same shape.
          if warm_start_mode == "cold" and os.path.exists(PARAMS_PATH):
              shutil.move(PARAMS_PATH, f"{PARAMS_PATH}.coldstart-backup-{int(time.time())}")
              print(f"Cold start: backed up existing {PARAMS_PATH}")
          elif warm_start_mode == "upload" and upload_path:
              with open(upload_path) as f:
                  raw = json.load(f)
              if "params" in raw and "strategy_name" in raw:
                  formatted = raw  # already in the correct shape
              else:
                  # Raw hyperopt epoch blob — wrap it into the expected shape.
                  params = raw.get("params_dict", raw)
                  formatted = {
                      "strategy_name": strategy_class,
                      "params": params,
                      "ft_stratparam_v": 1,
                      "export_time": time.time(),
                  }
              with open(PARAMS_PATH, "w") as f:
                  json.dump(formatted, f, indent=2)
              print(f"Warm start from upload: normalized and placed at {PARAMS_PATH}")
          else:
              print("Warm start: using whatever params file is already there, if any.")

          # --- Build and run the actual hyperopt command ---
          end = time.strftime("%Y%m%d")
          start = time.strftime("%Y%m%d", time.localtime(time.time() - lookback_days * 86400))
          timerange = f"{start}-{end}"

          cmd = [
              "freqtrade", "hyperopt",
              "--user-data-dir", USER_DATA,
              "--config", CONFIG_PATH,
              "--strategy", strategy_class,
              "--strategy-path", STRATEGY_DIR,
              "--hyperopt-loss", loss_function,
              "--epochs", str(epochs),
              "--timerange", timerange,
              "--spaces", "all",
              "-j", "-1",
          ]
          if early_stop:
              cmd += ["--early-stop", str(early_stop)]
          if random_state is not None:
              cmd += ["--random-state", str(random_state)]

          print("Running:", " ".join(cmd))
          send_telegram(f"🧬 Hyperopt starting for <b>{bot_name}</b> ({strategy_class}, "
                        f"{epochs} epochs, {loss_function}, {warm_start_mode} start)")

          result = subprocess.run(cmd, capture_output=True, text=True)
          print(result.stdout[-5000:])
          print(result.stderr[-3000:])

          if result.returncode != 0:
              send_telegram(f"❌ Hyperopt FAILED for <b>{bot_name}</b> — check the Actions log.")
              sys.exit(1)

          # Freqtrade exports the best epoch's params to PARAMS_PATH automatically
          # by default (we never pass --disable-param-export).
          send_telegram(f"✅ Hyperopt finished for <b>{bot_name}</b>. New params written to "
                        f"{strategy_class}.json"
                        + (" — reloading now." if reload_after else
                           " — will apply on its next scheduled reload or Restart Now."))

          if reload_after:
              control_path = f"{BOT_DIR}/control.json"
              with open(control_path, "w") as f:
                  json.dump({"restart_requested": True, "paused": False}, f)
              print(f"Wrote restart request to {control_path} for immediate reload.")
          PYEOF

          # Commit whatever changed — new params file, control.json if reload_after,
          # cold-start backup file. Same pull-rebase-retry pattern as everything
          # else in this system, since this is a multi-hour job and plenty else
          # will have pushed to this repo in the meantime.
          git add -A
          git commit -q -m "hyperopt: updated params via Hyperopt Runner" || true
          for attempt in 1 2 3 4 5; do
            if git push -q; then
              break
            fi
            git pull --rebase -q || true
            sleep $((attempt * 2))
          done
