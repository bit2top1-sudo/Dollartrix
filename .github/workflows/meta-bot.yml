name: Meta-Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-meta-bot]

# Concurrency guard — only one meta-bot at a time.
concurrency:
  group: meta-bot
  cancel-in-progress: true

jobs:
  run-meta-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # GitHub's hard cap for a single job — cannot be raised
    permissions:
      contents: write
      actions: write

    steps:
      - name: Clone private repo (Miadol — meta_bot.py lives here)
        run: |
          git clone https://x-access-token:${{ secrets.FREQTRADE_CORE_PAT }}@github.com/${{ github.repository_owner }}/Miadol.git private

      - name: Install dependencies
        run: pip install requests

      - name: Run meta-bot for ~5h50m
        env:
          META_BOT_TOKEN: ${{ secrets.META_BOT_TOKEN }}
          META_BOT_GITHUB_PAT: ${{ secrets.META_BOT_GITHUB_PAT }}
          OWNER_CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO: ${{ github.event.repository.name }}
        run: python3 private/meta_bot.py
        # meta_bot.py fires the restart dispatch itself before exiting (v41 fix).
        # The step below is a pure safety net in case that dispatch failed.

      - name: Safety-net fallback restart (30s wait then re-dispatch)
        if: always()
        env:
          PUBLIC_REPO: ${{ github.event.repository.name }}
        run: |
          # meta_bot.py already fired the restart dispatch synchronously before
          # exiting — so in the normal case this curl is a harmless duplicate
          # (the concurrency guard cancels any second trigger).
          # This step exists ONLY to cover the edge case where meta_bot.py
          # crashed before reaching its own dispatch call.
          #
          # We sleep only 30s (well within the 6h job cap) so this step can
          # never push the job over the limit and cause the old "exceeded
          # maximum execution time of 6h0m0s" kill that previously prevented
          # the restart from firing at all.
          sleep 30
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"restart-meta-bot"}'
          echo "Safety-net restart dispatch sent."
