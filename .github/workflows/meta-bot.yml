name: Meta-Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-meta-bot]

jobs:
  run-meta-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # GitHub's hard cap for a single job — cannot be raised
    permissions:
      contents: write
      actions: write

    steps:
      - name: Clone private repo (Miadol — meta_bot.py lives here)
        run: |
          git clone https://x-access-token:${{ secrets.FREQTRADE_CORE_PAT }}@github.com/${{ github.repository_owner }}/Miadol.git private

      - name: Install dependencies
        run: pip install requests

      - name: Run meta-bot for ~5h50m
        id: run
        env:
          META_BOT_TOKEN: ${{ secrets.META_BOT_TOKEN }}
          META_BOT_GITHUB_PAT: ${{ secrets.META_BOT_GITHUB_PAT }}
          OWNER_CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO: ${{ github.event.repository.name }}
        run: python3 private/meta_bot.py

      # Same if: always() pattern as everything else in this system — fires
      # no matter what happened above, EXCEPT when meta_bot.py itself detected
      # another instance was already active and deferred. Without this check,
      # a deferring instance exiting immediately + still dispatching a
      # replacement would spin up a rapid-fire chain of runs that all
      # immediately defer to each other — worse than the original duplicate.
      - name: Schedule next run
        if: always() && steps.run.outputs.skip_dispatch != 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"restart-meta-bot"}'
          echo "Next meta-bot run triggered."
