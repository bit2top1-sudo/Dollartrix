name: CustomBot - wfo2

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-custombot-wfo2]

# Concurrency guard — only one WFO bot at a time.
concurrency:
  group: custombot-wfo2
  cancel-in-progress: true

jobs:
  run-custom-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout public scaffold
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: public

      - name: Clone private repo (Miadol)
        run: |
          git clone https://x-access-token:${{ secrets.FREQTRADE_CORE_PAT }}@github.com/${{ github.repository_owner }}/Miadol.git private

      # ── Restore OHLCV data from Miadol repo ─────────────────────────────────
      # Data now lives in Miadol repo's freqtrade-core/user_data/data/.
      # VPS syncs to Miadol daily; workflows pull from there.
      # No artifacts, no re-downloads from exchanges.
      - name: Restore OHLCV data from Miadol repo
        run: |
          DATA_DIR="private/freqtrade-core/user_data/data"
          mkdir -p "$DATA_DIR"
          
          # Data is already in the Miadol repo from VPS sync
          if [ -d "private/freqtrade-core/user_data/data" ] && \
             [ "$(find private/freqtrade-core/user_data/data -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            DATA_SIZE=$(du -sh "$DATA_DIR" | cut -f1)
            echo "✓ OHLCV data ready (${DATA_SIZE})"
          else
            echo "⚠ No data in Miadol repo — WFO will auto-download as needed."
          fi

      # ── Install full stack (Freqtrade + hyperopt + WFO deps) ─────────────
      # WFO calls freqtrade as a subprocess so it needs the full stack.
      # WFO's own Python deps (aiohttp, python-dotenv, numpy) are included
      # here directly — no separate requirements.txt step needed.
      - name: Install Freqtrade + hyperopt deps
        run: |
          pip install "freqtrade[hyperopt]" scipy numba bottleneck scikit-learn statsmodels \
            aiohttp python-dotenv numpy
          # TA-Lib: try prebuilt wheel first; fall back to building from source.
          pip install ta-lib 2>/dev/null || (
            sudo apt-get install -y build-essential wget &&
            wget -q http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz &&
            tar -xzf ta-lib-0.4.0-src.tar.gz &&
            cd ta-lib && ./configure --prefix=/usr && make -j2 && sudo make install && cd .. &&
            pip install ta-lib
          )

      # ── Main run loop ─────────────────────────────────────────────────────
      - name: Run WFO for ~5h50m, commit state every 5min, then handoff
        env:
          BOT_NAME: "wfo2"
          META_BOT_GITHUB_PAT: ${{ secrets.META_BOT_GITHUB_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          cd private
          git config user.email "wfo2@local"
          git config user.name "WFO2 Bot"

          WFO_DIR="freqtrade-core/user_data/custom_bots/Wfo"
          USER_DATA="freqtrade-core/user_data"

          # ── Verify WFO directory structure exists ──────────────────────────
          if [ ! -f "${WFO_DIR}/main.py" ]; then
            echo "❌ ERROR: WFO main.py not found at ${WFO_DIR}/main.py"
            ls -la "${WFO_DIR}/" || echo "Directory does not exist!"
            exit 1
          fi

          # ── Inject Telegram credentials ───────────────────────────────────
          # Titan WFO reads TITAN_BOT_TOKEN and TITAN_CHAT_ID from env.
          # These are stored as bot_token.txt and chat_id.txt in the private
          # repo (same pattern as all other custom bots), so they persist
          # across restarts without needing GitHub secrets per bot.
          # On first run: create these files manually in the private repo once.
          export TITAN_BOT_TOKEN=$(cat "${WFO_DIR}/bot_token2.txt" 2>/dev/null || echo "")
          export TITAN_CHAT_ID=$(cat "${WFO_DIR}/chat_id2.txt" 2>/dev/null || echo "")

          # Also export under all common aliases so any component that reads
          # a different env var name still gets the right value.
          export BOT_TOKEN="$TITAN_BOT_TOKEN"
          export TELEGRAM_BOT_TOKEN="$TITAN_BOT_TOKEN"
          export TG_TOKEN="$TITAN_BOT_TOKEN"
          export CHAT_ID="$TITAN_CHAT_ID"
          export TELEGRAM_CHAT_ID="$TITAN_CHAT_ID"
          export TG_CHAT_ID="$TITAN_CHAT_ID"

          # ── Point WFO at the shared user_data directory ───────────────────
          # config.py auto-detects environment. On GitHub Actions none of the
          # hardcoded paths (_DOCKER_DIR, _HOST_DIR, _PHONE_DIR) exist, so it
          # falls through to "local" mode using the directory containing the
          # script itself as base. We override with TITAN_USER_DIR to point it
          # at the shared freqtrade-core/user_data instead, so strategies,
          # configs, hyperopts, and results are all in the shared location.
          export TITAN_USER_DIR="$(pwd)/${USER_DATA}"

          # ── Instance-specific state/lock file names ───────────────────────
          export TITAN_STATE_FILE="$(pwd)/${USER_DATA}/adb30_state_wfo2.json"
          export TITAN_LOCK_FILE="/tmp/adb30_wfo2_commander.lock"
          rm -f "$TITAN_LOCK_FILE"

          # ── Start WFO from parent directory (NOT from within Wfo/) ────────
          # FIX v31: Do NOT cd into WFO_DIR. Instead, set PYTHONPATH and run
          # with full path. This ensures main.py can import config, handlers,
          # etc. without import errors, and the working directory stays correct
          # for all relative path operations.
          export PYTHONPATH="${WFO_DIR}:${PYTHONPATH}"
          python3 "${WFO_DIR}/main.py" &
          WFO_PID=$!

          STOP_AFTER_SECONDS=$((5*3600 + 50*60))
          END_TIME=$(( $(date +%s) + STOP_AFTER_SECONDS ))

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            sleep 300

            if ! kill -0 "$WFO_PID" 2>/dev/null; then
              echo "WFO process exited unexpectedly — stopping early."
              break
            fi

            git pull --rebase -q || true

            if [ -f "${WFO_DIR}/control.json" ] && grep -q '"restart_requested": *true' "${WFO_DIR}/control.json"; then
              echo "Early restart requested by meta-bot — stopping."
              break
            fi

            # Commit all WFO state and result files every 5 minutes.
            # This includes: adb30_state.json, wfo_results/, hyperopt_results/,
            # wfo_masters/, research/, phoenix_calibration.json.
            # Strategies and hyperopts in user_data/strategies/ and
            # user_data/hyperopts/ are also committed here so they're
            # immediately available to live bots on their next restart.
            git add \
              "${USER_DATA}/adb30_state_wfo2.json" \
              "${USER_DATA}/wfo_results/" \
              "${USER_DATA}/hyperopt_results/" \
              "${USER_DATA}/wfo_masters/" \
              "${USER_DATA}/research/" \
              "${USER_DATA}/phoenix_calibration.json" \
              "${USER_DATA}/strategies/" \
              "${USER_DATA}/hyperopts/" \
              "${USER_DATA}/configs/" \
              "${WFO_DIR}/" \
              2>/dev/null || true
            git commit -m "autosave: wfo2 state - $(date -u)" -q || true
            git push -q || true
          done

          # ── Graceful shutdown ─────────────────────────────────────────────
          echo "Stopping WFO gracefully..."
          kill -TERM "$WFO_PID" 2>/dev/null || true
          wait "$WFO_PID" 2>/dev/null || true

          # ── Final state commit ────────────────────────────────────────────
          git pull --rebase -q || true

          if [ -f "${WFO_DIR}/control.json" ]; then
            PAUSED=$(grep -o '"paused": *true' "${WFO_DIR}/control.json" || echo "")
          else
            PAUSED=""
          fi
          if [ -n "$PAUSED" ]; then
            echo '{"paused": true, "restart_requested": false}' > "${WFO_DIR}/control.json"
          else
            echo '{"paused": false, "restart_requested": false}' > "${WFO_DIR}/control.json"
          fi

          git add \
            "${USER_DATA}/adb30_state_wfo2.json" \
            "${USER_DATA}/wfo_results/" \
            "${USER_DATA}/hyperopt_results/" \
            "${USER_DATA}/wfo_masters/" \
            "${USER_DATA}/research/" \
            "${USER_DATA}/phoenix_calibration.json" \
            "${USER_DATA}/strategies/" \
            "${USER_DATA}/hyperopts/" \
            "${USER_DATA}/configs/" \
            "${WFO_DIR}/" \
            2>/dev/null || true
          git commit -m "autosave: wfo2 final commit - $(date -u)" -q || true

          PUSH_OK=false
          for attempt in 1 2 3 4 5; do
            if git push -q; then
              PUSH_OK=true
              break
            fi
            git pull --rebase -q || true
            sleep $((attempt * 2))
          done
          if [ "$PUSH_OK" = false ]; then
            echo "::error::Final WFO commit FAILED after 5 attempts — state may not have persisted!"
          fi

      # ── Schedule next run ─────────────────────────────────────────────────
      # Same meta_restart check as live bots — meta-bot is sole restart
      # authority when present; self-dispatch fires only as a fallback.
      - name: Schedule next run
        if: always()
        run: |
          cd private && git pull --rebase -q || true
          WFO_DIR="freqtrade-core/user_data/custom_bots/wfo2"

          if [ -f "${WFO_DIR}/control.json" ] && grep -q '"paused": *true' "${WFO_DIR}/control.json"; then
            echo "WFO is paused — not scheduling next run."
            exit 0
          fi

          if [ -f "${WFO_DIR}/control.json" ] && grep -q '"meta_restart": *true' "${WFO_DIR}/control.json"; then
            echo "Meta-bot is handling this restart — skipping self-dispatch."
            exit 0
          fi

          echo "No meta-bot claim found — self-dispatching as fallback."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"restart-custombot-wfo2"}'
          echo "Next WFO run triggered."
